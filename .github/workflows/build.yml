name: Fabric Mod CI & Diagnostics
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # FIXED: Upgraded from 17.0.12 to 21 to satisfy the modern Fabric Loom plugin dependency
    - name: Set up GraalVM JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'graalvm'

    # The rest of your steps stay exactly the same
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # 1. CODE QUALITY CHECK
    - name: Run Static Code Analysis
      run: ./gradlew checkstyleMain --continue || echo "Checkstyle found issues!"

    # 2. GRADLE COMPILATION & MIXIN TRACKING
    - name: Build and Validate Mixins
      run: ./gradlew build

    # 3. CRASH LOG DIAGNOSTICS (Artifact Storage)
    - name: Archive Build & Crash Diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: compilation-diagnostics
        path: |
          build/reports/
          build/mixins.json
        if-no-files-found: ignore
